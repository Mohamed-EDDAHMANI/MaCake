<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 80" fill="none">
  <defs>
    <linearGradient id="iconGradW" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0296E"/>
      <stop offset="100%" stop-color="#9A0F45"/>
    </linearGradient>
    <filter id="shadowW" x="-20%" y="-10%" width="150%" height="150%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#DA1B61" flood-opacity="0.55"/>
    </filter>
  </defs>

  <!-- Icon box -->
  <rect x="0" y="8" width="64" height="64" rx="16" fill="url(#iconGradW)" filter="url(#shadowW)"/>
  <rect x="5" y="13" width="54" height="54" rx="13" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>

  <!-- Cake icon (white) -->
  <rect x="12" y="54" width="40" height="6" rx="3" fill="white"/>
  <rect x="14" y="44" width="36" height="12" rx="4" fill="white" fill-opacity="0.95"/>
  <rect x="19" y="34" width="26" height="12" rx="4" fill="white" fill-opacity="0.90"/>
  <ellipse cx="32" cy="28" rx="3.5" ry="4.5" fill="white" fill-opacity="0.85"/>
  <ellipse cx="32" cy="26.5" rx="1.8" ry="2" fill="#FFD1E3"/>
  <rect x="30.5" y="28" width="3" height="6" rx="1.5" fill="white"/>
  <circle cx="22" cy="50" r="1.5" fill="#DA1B61" fill-opacity="0.5"/>
  <circle cx="32" cy="50" r="1.5" fill="#DA1B61" fill-opacity="0.5"/>
  <circle cx="42" cy="50" r="1.5" fill="#DA1B61" fill-opacity="0.5"/>

  <!-- "Ma" — white, light -->
  <text
    x="78" y="55"
    font-family="'Segoe UI', -apple-system, system-ui, sans-serif"
    font-size="42"
    font-weight="300"
    fill="rgba(255,255,255,0.7)"
    letter-spacing="-1"
  >Ma</text>

  <!-- "Cake" — pure white, bold -->
  <text
    x="136" y="55"
    font-family="'Segoe UI', -apple-system, system-ui, sans-serif"
    font-size="42"
    font-weight="800"
    fill="white"
    letter-spacing="-1.5"
  >Cake</text>
</svg>
