version: "3.8"

services:
  mongodb:
    image: mongo:7
    container_name: macack-mongodb-dev
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongodb_data_dev:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - macack-network

  rabbitmq:
    image: rabbitmq:3-management
    container_name: macack-rabbitmq-dev
    ports:
      - "5673:5672"
      - "15673:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
      RABBITMQ_ERLANG_COOKIE: "macack_secret_cookie"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - macack-network

  redis:
    image: redis:7-alpine
    container_name: macack-redis-dev
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - macack-network

  minio:
    image: minio/minio:latest
    container_name: macack-minio-dev
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data_dev:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - macack-network

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: gateway-dev
    command: npm run start:dev
    volumes:
      - ./gateway:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: mongodb://root:password@mongodb:27017/gateway_db?authSource=admin
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672?heartbeat=30
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: WDulkMiuJhDkWtxJ9pzfWogfOowGAaKDIC8X6DKYVQ9zBMP5kBvpY-qxj4HZBjq_
      MINIO_INTERNAL_URL: http://minio:9000
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    networks:
      - macack-network

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: auth-service-dev
    command: npm run start:dev
    volumes:
      - ./auth-service:/app
      - /app/node_modules
    environment:
      MONGODB_URI: mongodb://root:password@mongodb:27017/auth_db?authSource=admin
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672?heartbeat=30
      RABBITMQ_AUTH_QUEUE: auth_queue
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: WDulkMiuJhDkWtxJ9pzfWogfOowGAaKDIC8X6DKYVQ9zBMP5kBvpY-qxj4HZBjq_
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: auth
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - macack-network
    ports:
      - "3001:3001"

  catalog-service:
    build:
      context: ./catalog-service
      dockerfile: Dockerfile
    container_name: catalog-service-dev
    command: npm run start:dev
    volumes:
      - ./catalog-service:/app
      - /app/node_modules
    environment:
      MONGODB_URI: mongodb://root:password@mongodb:27017/catalog_db?authSource=admin
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672?heartbeat=30
      RABBITMQ_CATALOG_QUEUE: catalog_queue
      RABBITMQ_AUTH_QUEUE: auth_queue
      REDIS_HOST: redis
      REDIS_PORT: 6379
      TCP_PORT: 3002
      PORT: 3002
      HOST: catalog-service
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: catalog
      CHOKIDAR_USEPOLLING: "true"
    deploy:
      resources:
        limits:
          memory: 1G
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - macack-network
    ports:
      - "3002:3002"

  notation-service:
    build:
      context: ./notation-service
      dockerfile: Dockerfile
    container_name: notation-service-dev
    command: npm run start:dev
    volumes:
      - ./notation-service:/app
      - /app/node_modules
    environment:
      MONGODB_URI: mongodb://root:password@mongodb:27017/notation_db?authSource=admin
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672?heartbeat=30
      RABBITMQ_NOTATION_QUEUE: notation_queue
      RABBITMQ_CATALOG_QUEUE: catalog_queue
      REDIS_HOST: redis
      REDIS_PORT: 6379
      TCP_PORT: 3006
      PORT: 3006
      HOST: notation-service
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - macack-network
    ports:
      - "3006:3006"

  payment-service:
    build:
      context: ./payment-service
      dockerfile: Dockerfile
    container_name: payment-service-dev
    command: npm run start:dev
    volumes:
      - ./payment-service:/app
      - /app/node_modules
    environment:
      MONGODB_URI: mongodb://root:password@mongodb:27017/payment_db?authSource=admin
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672?heartbeat=30
      RABBITMQ_PAYMENT_QUEUE: payment_queue
      RABBITMQ_ORDERS_QUEUE: orders_queue
      RABBITMQ_AUTH_QUEUE: auth_queue
      REDIS_HOST: redis
      REDIS_PORT: 6379
      TCP_PORT: 3005
      PORT: 3005
      HOST: payment-service
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - macack-network
    ports:
      - "3005:3005"

  order-service:
    build:
      context: ./order-service
      dockerfile: Dockerfile
    container_name: order-service-dev
    command: npm run start:dev
    volumes:
      - ./order-service:/app
      - /app/node_modules
    environment:
      MONGODB_URI: mongodb://root:password@mongodb:27017/orders_db?authSource=admin
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672?heartbeat=30
      REDIS_HOST: redis
      REDIS_PORT: 6379
      TCP_PORT: 3003
      PORT: 3003
      HOST: order-service
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - macack-network
    ports:
      - "3003:3003"

volumes:
  mongodb_data_dev:
  minio_data_dev:

networks:
  macack-network:
    driver: bridge